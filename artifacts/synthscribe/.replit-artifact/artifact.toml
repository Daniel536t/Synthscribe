kind = "web"
previewPath = "/"
title = "SynthScribe"
version = "1.0.0"
id = "artifacts/synthscribe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25205

[services.development]
run = "pnpm --filter @workspace/synthscribe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/synthscribe", "run", "build" ]
publicDir = "artifacts/synthscribe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25205"
BASE_PATH = "/"
